# Dwello tmux config

# Use Ctrl-a as prefix (easier than Ctrl-b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Session persistence - keep sessions alive
set -g destroy-unattached off
set -g detach-on-destroy off

# Mouse support
set -g mouse on

# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 50000

# Easy split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New windows keep current path
bind c new-window -c "#{pane_current_path}"

# Easy pane switching
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Status bar
set -g status-style 'bg=#1e293b fg=#e2e8f0'
set -g status-left '#[fg=#38bdf8,bold] #S '
set -g status-right '#[fg=#94a3b8]%H:%M '
set -g status-left-length 30
