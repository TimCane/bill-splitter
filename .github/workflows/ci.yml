name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Per-tree path filters: each job runs only when its tree (or the docs
  # contracts) change; contract runs when either backend or frontend change.
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ocr: ${{ steps.filter.outputs.ocr }}
      contract: ${{ steps.filter.outputs.contract }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docs/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - 'docs/**'
              - '.github/workflows/ci.yml'
            ocr:
              - 'ocr/**'
              - 'docs/**'
              - '.github/workflows/ci.yml'
            contract:
              - 'backend/**'
              - 'frontend/**'

  backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-
      - run: dotnet restore
      - run: dotnet build --no-restore -c Release -warnaserror
      - run: dotnet test --no-build -c Release

  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: '11.9.0'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --check .
      - run: pnpm lint
      - run: pnpm exec tsc -b
      - run: pnpm test
      - run: pnpm build

  ocr:
    needs: changes
    if: ${{ needs.changes.outputs.ocr == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ocr
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ocr/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest -q

  contract:
    needs: changes
    if: ${{ needs.changes.outputs.contract == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The NSwag client is generated from the API surface, which lands in M2.
      # Until DTOs exist this job has nothing to diff (docs/12-ci.md).
      - run: echo "contract check activates with the API surface in M2"

  e2e:
    needs: changes
    # Expensive full-stack run: only on main or when a PR is labeled 'e2e'.
    if: ${{ github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'e2e') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Puppeteer specs and the full compose stack land in M7
      # (docs/11-testing-strategy.md#end-to-end-puppeteer).
      - run: echo "e2e specs are stubbed until M7"
